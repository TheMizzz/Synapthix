<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Synapthix — Литературный Ассистент</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>📚 Synapthix</h1>
        <p>Твой литературный помощник</p>
    </header>

    <main>
        <!-- Вкладки -->
        <nav class="tabs">
            <button class="tab-btn active" data-tab="search">🔍 Поиск книг</button>
            <button class="tab-btn" data-tab="upload">📚 Загрузка книг</button>
            <button class="tab-btn" data-tab="fragments">🔍 Поиск фрагментов</button>
            <button class="tab-btn" data-tab="ask">💬 Ответ на вопрос</button>
        </nav>

        <div class="tab-content">
            <!-- Поиск книг -->
            <section id="search" class="tab-pane active">
                <h2>Найти книгу по описанию</h2>
                <input type="text" id="book-desc" placeholder="Опиши книгу...">
                <button onclick="searchBooks()">Найти</button>
                <div id="search-results"></div>
            </section>

            <!-- Загрузка книг -->
            <section id="upload" class="tab-pane">
                <h2>Загрузить книги (.txt)</h2>
                <input type="file" id="book-files" multiple accept=".txt">
                <button onclick="uploadBooks()">Загрузить</button>
                <div id="upload-status"></div>
            </section>

            <!-- Поиск фрагментов -->
            <section id="fragments" class="tab-pane">
                <h2>Найти фрагмент по смыслу</h2>
                <input type="text" id="fragment-query" placeholder="Например: где говорится про любовь...">
                <button onclick="searchFragments()">Найти</button>
                <div id="fragment-results"></div>
            </section>

            <!-- Вопрос -->
            <section id="ask" class="tab-pane">
                <h2>Задать вопрос по книге</h2>
                <input type="text" id="question-input" placeholder="Что произошло с Наташей в Войне и Мире?">
                <button onclick="askQuestion()">Ответить</button>
                <div id="answer-result"></div>
                <div id="quotes-result"></div>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
